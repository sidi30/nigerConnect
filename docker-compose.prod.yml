# =============================================================================
# NigerConnect — Production deployment (VPS rag-prod-1, sahabiguide.com stack)
# =============================================================================
#
# Pattern (matches the existing sahabi-* / cs-* deployments on the same host):
#   - Reverse proxy + HTTPS  → existing Traefik container on `traefik-public`
#   - Internal services      → private `nigerconnect-internal` network, NO host
#                              port mappings (zero conflict with neighbors)
#   - DNS / TLS              → Cloudflare-proxied subdomains, Let's Encrypt DNS
#                              challenge via the existing `letsencrypt-dns` resolver
#   - Middleware             → cloudflare-only@file (only Cloudflare egress IPs)
#
# Four single-level subdomains of the owned apex nigerconnect.app (Cloudflare
# Universal SSL covers one level):
#   - ${WEB_HOST}   (default: nigerconnect.app)        → web vitrine (Next.js)
#   - ${API_HOST}   (default: api.nigerconnect.app)    → API + Socket.io
#   - ${CDN_HOST}   (default: cdn.nigerconnect.app)    → MinIO public bucket
#   - ${ADMIN_HOST} (default: tenant.nigerconnect.app) → admin console (same web container)
# All four must exist as Cloudflare A records → 46.224.193.109, proxied=ON.
#
# Deploy:
#   cd /opt/apps/nigerConnect
#   cp .env.prod.example .env.prod
#   $EDITOR .env.prod          # fill in secrets
#   ./scripts/deploy-vps.sh
#
# =============================================================================

x-security: &security-defaults
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

x-traefik-common: &traefik-common
  - traefik.enable=true
  - traefik.docker.network=traefik-public

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 with PostGIS — internal only.
  # Not mapped to any host port. Reach it via SSH tunnel for debug:
  #   ssh -L 15432:nigerconnect-postgres:5432 root@46.224.193.109
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: nigerconnect-postgres
    <<: *security-defaults
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Europe/Paris
    volumes:
      - nigerconnect-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # Redis 7 — internal only.
  # Auth enabled in production: requirepass + persistence.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nigerconnect-redis
    <<: *security-defaults
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - nigerconnect-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object store.
  # - Internal API on the `internal` network (used by the NestJS API).
  # - Public read on the public bucket via Traefik on ${CDN_HOST}.
  #   The bucket name is part of the URL path, so requests reaching MinIO
  #   look like /nigerconnect/<key>. The private bucket has anonymous=none,
  #   so /nigerconnect-private/<key> returns 403 even if discovered.
  # The MinIO web console (port 9001) is NOT exposed publicly — reach it
  # via SSH tunnel: ssh -L 19001:nigerconnect-minio:9001 root@VPS.
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: nigerconnect-minio
    <<: *security-defaults
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - nigerconnect-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      # Public media on its own subdomain. Browser fetches
      # https://${CDN_HOST}/nigerconnect/avatars/abc.jpg → MinIO returns
      # the object from the `nigerconnect` (anonymous-download) bucket.
      # Requests to /nigerconnect-private/* return 403 (anonymous=none).
      - traefik.http.routers.nigerconnect-cdn.rule=Host(`${CDN_HOST:?CDN_HOST is required}`)
      - traefik.http.routers.nigerconnect-cdn.entrypoints=https
      - traefik.http.routers.nigerconnect-cdn.tls.certresolver=letsencrypt-dns
      - traefik.http.routers.nigerconnect-cdn.middlewares=cloudflare-only@file,nigerconnect-cdn-cache
      - traefik.http.services.nigerconnect-cdn.loadbalancer.server.port=9000
      # Long browser cache for static media (URLs are immutable — keys are UUIDs).
      - traefik.http.middlewares.nigerconnect-cdn-cache.headers.customResponseHeaders.Cache-Control=public, max-age=31536000, immutable
    networks:
      - internal
      - traefik-public
    deploy:
      resources:
        limits:
          memory: 512M

  # Init container: create the public + private buckets with the right ACLs.
  # Runs once and exits — `restart: no` is intentional.
  minio-init:
    image: minio/mc:latest
    container_name: nigerconnect-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${S3_BUCKET};
      mc mb --ignore-existing local/${S3_PRIVATE_BUCKET};
      mc anonymous set download local/${S3_BUCKET};
      mc anonymous set none local/${S3_PRIVATE_BUCKET};
      echo 'Buckets ready.';
      "
    networks:
      - internal
    restart: "no"

  # ---------------------------------------------------------------------------
  # NestJS API — exposed on https://${API_HOST} via Traefik.
  # No host port mapping — Traefik bridges from `traefik-public`.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: nigerconnect-api:latest
    container_name: nigerconnect-api
    <<: *security-defaults
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT: http://minio:9000
      # Public-facing MinIO URL — used to sign upload/download URLs the mobile
      # app actually calls. Internal endpoint (`http://minio:9000`) is unreachable
      # from outside Docker, so signing must use the Traefik-exposed hostname.
      S3_PUBLIC_ENDPOINT: https://${CDN_HOST:?CDN_HOST is required}
      S3_REGION: ${S3_REGION:-eu-west-1}
      S3_BUCKET: ${S3_BUCKET}
      S3_PRIVATE_BUCKET: ${S3_PRIVATE_BUCKET}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: "true"
      CDN_URL: ${CDN_URL:?CDN_URL is required}
      JWT_PRIVATE_KEY_PATH: /app/keys/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt-public.pem
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 14d
      JWT_ISSUER: nigerconnect-api
      JWT_AUDIENCE: nigerconnect-app
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required}
      # Includes the admin host: the admin console (served on ${ADMIN_HOST})
      # makes cross-origin XHR + WebSocket calls to this API. Override in
      # .env.prod to add/remove origins; never use a wildcard in prod.
      CORS_ORIGINS: ${CORS_ORIGINS:-https://${WEB_HOST},https://${ADMIN_HOST}}
      API_URL: https://${API_HOST}
      APP_WEB_URL: https://${WEB_HOST}
      # OAuth client IDs are PUBLIC identifiers (they ship inside the mobile app),
      # not secrets — safe to bake as defaults so prod works out of the box.
      # Still overridable via .env.prod. The API trusts a Google token whose
      # `aud` matches ANY of these; list every platform that signs in.
      GOOGLE_CLIENT_ID_WEB: ${GOOGLE_CLIENT_ID_WEB:-682162626945-mghtoue8lhutmbhbnncommncjgk0ci73.apps.googleusercontent.com}
      GOOGLE_CLIENT_ID_ANDROID: ${GOOGLE_CLIENT_ID_ANDROID:-682162626945-opkbbi8ikl552tb7sk52fk7a80svfkmk.apps.googleusercontent.com}
      GOOGLE_CLIENT_ID_IOS: ${GOOGLE_CLIENT_ID_IOS:-682162626945-3ue1vob70l5m0mbv58isko0pcdoc3071.apps.googleusercontent.com}
      # Apple audience = the app bundle id (public). Required for Sign in with Apple to verify.
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-com.nigerconnect.app}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-NigerConnect <no-reply@${WEB_HOST}>}
      # SMTP (IONOS) — real email delivery. Values live in .env.prod.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      # DKIM signing (deliverability) — private key (base64 PEM) in .env.prod.
      DKIM_DOMAIN: ${DKIM_DOMAIN:-}
      DKIM_SELECTOR: ${DKIM_SELECTOR:-}
      DKIM_PRIVATE_KEY_B64: ${DKIM_PRIVATE_KEY_B64:-}
      FCM_SERVICE_ACCOUNT_JSON: ${FCM_SERVICE_ACCOUNT_JSON:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      # JWT keypair — mounted read-only. Generated by deploy-vps.sh on first run.
      - ./secrets/jwt-private.pem:/app/keys/jwt-private.pem:ro
      - ./secrets/jwt-public.pem:/app/keys/jwt-public.pem:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.nigerconnect-api.rule=Host(`${API_HOST}`)
      - traefik.http.routers.nigerconnect-api.entrypoints=https
      - traefik.http.routers.nigerconnect-api.tls.certresolver=letsencrypt-dns
      - traefik.http.routers.nigerconnect-api.middlewares=cloudflare-only@file
      - traefik.http.services.nigerconnect-api.loadbalancer.server.port=3000
    networks:
      - internal
      - traefik-public
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # Next.js web (landing) — exposed on https://${WEB_HOST}.
  # Static / standalone build → tiny memory footprint.
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* are inlined at build time; needed for the admin console
        # + verify-email page to reach the API. Override via .env.prod if hosts differ.
        NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL:-https://api.nigerconnect.app/api}
        NEXT_PUBLIC_APP_URL: ${WEB_PUBLIC_URL:-https://nigerconnect.app}
    image: nigerconnect-web:latest
    container_name: nigerconnect-web
    <<: *security-defaults
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      # Public vitrine — apex domain. Single-level subdomains only (Cloudflare
      # Universal SSL covers one level). No `www.` here.
      - traefik.http.routers.nigerconnect-web.rule=Host(`${WEB_HOST}`)
      - traefik.http.routers.nigerconnect-web.entrypoints=https
      - traefik.http.routers.nigerconnect-web.tls.certresolver=letsencrypt-dns
      - traefik.http.routers.nigerconnect-web.middlewares=cloudflare-only@file
      - traefik.http.services.nigerconnect-web.loadbalancer.server.port=3000
      # Admin console — same Next.js container, served on its own host
      # (${ADMIN_HOST}, e.g. tenant.nigerconnect.app). The web app's middleware
      # rewrites this host onto the /admin route group and 404s /admin on the
      # public vitrine. Reuses the nigerconnect-web loadbalancer (port 3000).
      - traefik.http.routers.nigerconnect-admin.rule=Host(`${ADMIN_HOST:?ADMIN_HOST is required}`)
      - traefik.http.routers.nigerconnect-admin.entrypoints=https
      - traefik.http.routers.nigerconnect-admin.tls.certresolver=letsencrypt-dns
      - traefik.http.routers.nigerconnect-admin.middlewares=cloudflare-only@file
      - traefik.http.routers.nigerconnect-admin.service=nigerconnect-web
    networks:
      - traefik-public
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  # Private network for app ↔ data services. NOT externally reachable.
  internal:
    name: nigerconnect-internal
    driver: bridge

  # Existing public network where Traefik is attached.
  traefik-public:
    external: true

volumes:
  nigerconnect-postgres-data:
  nigerconnect-redis-data:
  nigerconnect-minio-data:
