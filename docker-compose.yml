services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: nigerconnect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nigerconnect
      POSTGRES_USER: nigerconnect
      # Dev-only password. NEVER reuse this in any non-local environment.
      # See docker-compose.prod.example.yml for the production pattern
      # (Docker secrets or an external secret manager).
      POSTGRES_PASSWORD: nigerconnect
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nigerconnect -d nigerconnect"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nigerconnect-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nigerconnect-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # Dev-only defaults. In prod, use docker-compose.prod.example.yml which
      # reads these from Docker secrets.
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: nigerconnect-minio-init
    depends_on:
      minio:
        condition: service_healthy
    # Two buckets with very different access rules:
    #   - nigerconnect         : PUBLIC media (avatars, post photos, stories).
    #                            Anonymous download enabled so the CDN serves
    #                            files without auth. Upload still requires
    #                            credentialed presigned URLs.
    #   - nigerconnect-private : SENSITIVE uploads (identity documents, private
    #                            chat media). NO public access — every read
    #                            goes through a short-lived presigned GET.
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/nigerconnect;
      mc mb --ignore-existing local/nigerconnect-private;
      mc anonymous set download local/nigerconnect;
      mc anonymous set none local/nigerconnect-private;
      exit 0;
      "

volumes:
  postgres-data:
  redis-data:
  minio-data:
