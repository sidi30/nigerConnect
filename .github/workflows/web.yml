name: Web CI

# CI on PRs and develop. Production deploy goes to the VPS via
# .github/workflows/deploy.yml (Traefik + docker compose), not Vercel.
on:
  push:
    branches: [develop]
    paths:
      - 'apps/web/**'
      - 'packages/shared-types/**'
      - 'packages/config/**'
      - '.github/workflows/web.yml'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/shared-types/**'
      - 'packages/config/**'
      - '.github/workflows/web.yml'
      - 'pnpm-lock.yaml'

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck (web + shared-types)
        run: |
          pnpm --filter @nigerconnect/shared-types typecheck
          pnpm --filter @nigerconnect/web typecheck

      - name: Lint
        run: pnpm --filter @nigerconnect/web lint

      - name: Build (Next.js standalone)
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: pnpm --filter @nigerconnect/web build
