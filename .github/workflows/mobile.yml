name: Mobile CI + OTA

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared-types/**'
      - 'packages/config/**'
      - '.github/workflows/mobile.yml'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'packages/shared-types/**'
      - 'packages/config/**'
      - '.github/workflows/mobile.yml'
      - 'pnpm-lock.yaml'

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Run all JavaScript-based actions on Node 24 (GitHub forces this on 2026-06-16;
# opt in early so any breakage surfaces here, not on the deadline).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck (mobile + shared-types)
        run: |
          pnpm --filter @nigerconnect/shared-types typecheck
          pnpm --filter @nigerconnect/mobile typecheck

  # ── OTA update (EAS Update) on every push to main ─────────────────────
  # Publishes the JS bundle to the `production` channel. Devices running a
  # build whose runtime version matches pick it up at next app launch.
  # Native changes (new packages, app.json plugins, SDK upgrade) are NOT
  # shipped this way — they need a full `eas build` + store submission.
  #
  # Required secret: EXPO_TOKEN (https://expo.dev/accounts/sidi30/settings/access-tokens)
  eas-update:
    needs: typecheck
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production-mobile
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Publish OTA update (channel production)
        working-directory: apps/mobile
        env:
          # Passed via env (not inline interpolation) — commit messages can
          # contain quotes/newlines that would break or inject into the shell.
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          eas update \
            --channel production \
            --message "$(echo "$COMMIT_MSG" | head -1 | cut -c1-120)" \
            --non-interactive

      - name: Summary
        run: |
          echo "📲 OTA update published on channel **production**" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
